services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketpulse
      POSTGRES_PASSWORD: marketpulse
      POSTGRES_DB: marketpulse
    # No host port — only backend connects via Docker network
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketpulse"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://marketpulse:marketpulse@db:5432/marketpulse
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
